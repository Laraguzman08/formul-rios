<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title> Adoção de Cães | ONG </title>
</head>
<body>

    <h2> Formulário de Adoção </h2>

    <form id="formAdocao">
        <label for="nome"> Nome: </label>
        <input type="text" id="nome" placeholder="Digite seu nome completo">
        <br><br>
        <label for="email"> Email: </label>
        <input type="email" id="email" placeholder="Digite seu email">
        <br><br>
        <label for="telefone"> Telefone: </label>
        <input type="text" id="telefone" placeholder="Digite seu número">
        <br><br>
        <label for="cpf"> CPF: </label>
        <input type="text" id="cpf" placeholder="Digite seu cpf">
        <br><br>
        <label for="idade"> Idade: </label>
        <input type="number" id="idade" placeholder="Digite sua idade">
        <br><br>
        <label for="cidade"> Cidade: </label>
        <input type="text" id="cidade" placeholder="Digite sua cidade">
        <br><br>
        <label for="moradia"> Moradia: </label>
        <select name="moradia" id="moradia">
            <option value=""> Selecione </option>
            <option value="casa"> Casa </option>
            <option value="apartamento"> Apartamento </option>
        </select>
        <br><br>
        <label for="quintal"> Possui quintal? </label>
        <input type="radio" name="quintal" value="sim"> Sim
        <input type="radio" name="quintal" value="nao"> Não
        <br><br>
        <button type="submit"> Enviar </button>
    </form>

    <div id="resultado"></div>

    <script src="scripts/script.js"></script>

</body>
</html>
